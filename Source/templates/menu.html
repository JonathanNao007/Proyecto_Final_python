{% extends 'layout.html' %}

{% block contenido %}
    <div class="menu-card">
            <!-- Encabezado de la tabla con contador -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
                <h5 class="mb-0">
                    <i class="fas fa-utensils me-2 text-danger"></i>
                    Menu
                </h5>
                <span class="badge bg-secondary rounded-pill px-3 py-2">
                    <i class="fas fa-hashtag me-1"></i> {{ menu|length }} Productos
                </span>
            </div>

            <!-- Tabla responsiva -->
            <div class="table-responsive">
                <table class="table table-menu table-hover align-middle">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag me-1"></i> Producto</th>
                            <th><i class="fas fa-user me-1"></i> Descripción</th>
                            <th><i class="fas fa-user me-1"></i> Precio</th>
                            <th class="text-center"><i class="fas fa-ellipsis-v me-1"></i> Editar</th>
                            <th class="text-center"><i class="fas fa-times me-1"></i> Eliminar</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for m in menu %}
                            <tr>
                                <td><span class="fw-bold text-danger">#{{ m[0] }}</span></td>
                                <td><i class="fas fa-user-circle me-2 text-secondary"></i>{{ m[1] }}</td>
                                <td><i class="fas fa-user-circle me-2 text-secondary"></i>{{ m[2] }}</td>
                                <td class="text-center">
                                    <a href="{{url_for('menu.agrega_edita_menu', menu_id=m[0])}}">
                                        <button class="btn-detalle" title="Editar producto">
                                            <i class="fas fa-eye me-1"></i> Editar
                                        </button>
                                    </a>
                                    
                                </td>
                                <td class="text-center">
                                    <form action="{{ url_for('menu.elimina_menu', menu_id=m[0]) }}" method="POST" style="display:inline;">
                                        <button class="btn-cancelar" type="submit" title="Eliminar producto">
                                            <i class="fas fa-times me-1"></i> Eliminar
                                        </button>
                                    </form>                                   
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <!-- Pie de tabla con información -->
            <div class="d-flex justify-content-center align-items-center mt-3 pt-3 border-top flex-wrap">
                <!-- Botón Crear Cliente -->
                <a href="{{url_for('menu.agrega_edita_menu', menu_id=0)}}">
                    <button class="btn btn-outline-primary" id="btnMenu">
                        <i class="fas fa-utensils me-1"></i> Agregar Producto
                    </button>
                </a>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top flex-wrap">
                <small class="text-muted">
                    <i class="fas fa-info-circle me-1"></i>
                    Mostrando <strong>{{ menu|length }}</strong> productos
                </small>
                <small class="text-muted">
                    <i class="fas fa-clock me-1"></i>
                    Última actualización: <span id="hora-actual"></span>
                </small>
            </div>
        </div>
{% endblock %}
